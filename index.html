<body>
  <!-- Uber-style Predictive Prefetching -->
  <script>
    (function () {
      // Prefetch queue to avoid duplicate requests
      const prefetched = new Set();

      // Prefetch a URL if not already done
      function prefetchUrl(url) {
        if (prefetched.has(url)) return;
        prefetched.add(url);

        const link = document.createElement('link');
        link.rel = 'prefetch';
        link.href = url;
        document.head.appendChild(link);
      }

      // Prefetch on hover/touch start (Uber trick)
      document.addEventListener('mouseover', function (e) {
        const target = e.target.closest('a, button[data-href]');
        if (!target) return;

        const href = target.getAttribute('href') || target.getAttribute('data-href');
        if (!href || href.startsWith('#') || href.startsWith('http')) return;

        // Prefetch common routes
        if (href.includes('/cart') || href.includes('/orders') ||
          href.includes('/profile') || href.includes('/cafeterias') ||
          href.includes('/vendors')) {
          prefetchUrl(href);
        }
      }, true);

      // Touch start prefetch for mobile
      document.addEventListener('touchstart', function (e) {
        const target = e.target.closest('a, button[data-href]');
        if (!target) return;

        const href = target.getAttribute('href') || target.getAttribute('data-href');
        if (!href || href.startsWith('#') || href.startsWith('http')) return;

        if (href.includes('/cart') || href.includes('/orders') ||
          href.includes('/profile') || href.includes('/cafeterias') ||
          href.includes('/vendors')) {
          prefetchUrl(href);
        }
      }, { passive: true });

      // Prefetch critical routes on page load (after a short delay)
      setTimeout(function () {
        // Prefetch cart and orders - most likely next actions
        prefetchUrl('#/cart');
        prefetchUrl('#/orders');
      }, 2000);
    })();
  </script>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <script defer src="https://js.paystack.co/v1/inline.js"></script>
</body>
